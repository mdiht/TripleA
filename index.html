<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple A</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Header & Search Section */
        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            font-size: 36px;
            color: #ff4757;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 14px 20px;
            background-color: #1a1a1a;
            border: 2px solid #2d2d2d;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .search-container input:focus {
            border-color: #ff4757;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
        }

        /* Movie Box Grid Layout */
        .landing-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 25px;
            border-left: 4px solid #ff4757;
            padding-left: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .anime-card {
            background: #141414;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            aspect-ratio: 2/3;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            border-color: #ff4757;
            box-shadow: 0 12px 20px rgba(255, 71, 87, 0.25);
        }

        /* Thumbnail Image Style */
        .anime-card img {
            width: 100%;
            height: 80%;
            object-fit: cover;
            background-color: #222;
        }

        .anime-info {
            padding: 15px;
            background-color: #141414;
            text-align: center;
            height: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .anime-info h3 {
            margin: 0;
            font-size: 16px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Video Player View */
        .player-container-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            background-color: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 10px 22px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
            align-self: flex-start;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #ff4757;
            border-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        .controls-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        select {
            background-color: #1a1a1a;
            color: #fff;
            border: 2px solid #333;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            min-width: 180px;
            transition: 0.3s;
        }

        select:focus {
            border-color: #ff4757;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #222;
        }

        #animeVideoFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Bypass Layers & Popups */
        .click-bypass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            cursor: pointer;
            background: rgba(0,0,0,0.01);
            display: none;
        }

        .ad-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .ad-box {
            background: #1a1a1a;
            padding: 35px;
            border-radius: 15px;
            border: 2px solid #ff4757;
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.3);
        }

        .ad-box h2 {
            margin-top: 0;
            font-size: 22px;
            color: #ff4757;
        }

        .ad-btn {
            display: inline-block;
            background-color: #ff4757;
            color: white;
            padding: 12px 28px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .ad-btn:hover {
            background-color: #ff6b81;
        }

        .close-btn {
            display: none;
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover {
            background-color: #26af5f;
        }

        @media (max-width: 768px) {
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
            select {
                width: 100%;
            }
        }
    </style>
</head>

    };
    let currentSelectedAnime = "";
    const mainHeader = document.getElementById('mainHeader');
    const landingPage = document.getElementById('landingPage');
    const playerPage = document.getElementById('playerPage');
    const animeGrid = document.getElementById('animeGrid');
    const searchBar = document.getElementById('searchBar');
    const animeSelect = document.getElementById('animeSelect');
    const seasonSelect = document.getElementById('seasonSelect');
    const languageSelect = document.getElementById('languageSelect');
    const episodeSelect = document.getElementById('episodeSelect');
    const videoFrame = document.getElementById('animeVideoFrame');
    const bypassLayer = document.getElementById('bypassLayer');

    // 1. Render Box Cards using JavaScript
    function renderGrid(filterText = "") {
        animeGrid.innerHTML = "";
        const animeTitles = Object.keys(animeData);
        animeTitles.forEach(title => {
            if (title.toLowerCase().includes(filterText.toLowerCase())) {
                const card = document.createElement('div');
                card.className = "anime-card";
                card.setAttribute('onclick', `openPlayer('${title.replace(/'/g, "\\'")}')`);
                
                const posterUrl = animeData[title].poster || "https://via.placeholder.com/200x300?text=No+Image";
                card.innerHTML = `
                    <img src="${posterUrl}" alt="${title}">
                    <div class="anime-info">
                        <h3>${title}</h3>
                    </div>
                `;
                animeGrid.appendChild(card);
            }
        });
    }

    searchBar.addEventListener('input', (e) => {
        renderGrid(e.target.value);
    });

    window.openPlayer = function(animeName) {
        currentSelectedAnime = animeName;
        animeSelect.value = animeName;
        landingPage.style.display = 'none';
        mainHeader.style.display = 'none';
        playerPage.style.display = 'flex';
        
        seasonSelect.innerHTML = '<option value="">Select Season</option>';
        languageSelect.innerHTML = '<option value="">Select Language</option>';
        episodeSelect.innerHTML = '<option value="">Select Episode</option>';
        languageSelect.disabled = true;
        episodeSelect.disabled = true;

        if (animeData[animeName] && animeData[animeName].seasons) {
            for (let season in animeData[animeName].seasons) {
                let option = document.createElement('option');
                option.value = season;
                option.innerText = season;
                seasonSelect.appendChild(option);
            }
        }
    }

    window.backToHome = function() {
        playerPage.style.display = 'none';
        landingPage.style.display = 'block';
        mainHeader.style.display = 'block';
        videoFrame.src = "";
        bypassLayer.style.display = 'none';
        currentSelectedAnime = "";
        searchBar.value = "";
        renderGrid();
    }

    seasonSelect.addEventListener('change', () => {
        languageSelect.innerHTML = '<option value="">Select Language</option>';
        episodeSelect.innerHTML = '<option value="">Select Episode</option>';
        languageSelect.disabled = true;
        episodeSelect.disabled = true;
        videoFrame.src = "";
        bypassLayer.style.display = 'none';

        const season = seasonSelect.value;
        if (season && animeData[currentSelectedAnime].seasons[season]) {
            languageSelect.disabled = false;
            for (let lang in animeData[currentSelectedAnime].seasons[season]) {
                let option = document.createElement('option');
                option.value = lang;
                option.innerText = lang;
                languageSelect.appendChild(option);
            }
        }
    });

    languageSelect.addEventListener('change', () => {
        episodeSelect.innerHTML = '<option value="">Select Episode</option>';
        episodeSelect.disabled = true;
        videoFrame.src = "";
        bypassLayer.style.display = 'none';

        const season = seasonSelect.value;
        const lang = languageSelect.value;
        if (lang && animeData[currentSelectedAnime].seasons[season][lang]) {
            episodeSelect.disabled = false;
            for (let ep in animeData[currentSelectedAnime].seasons[season][lang]) {
                let option = document.createElement('option');
                option.value = ep;
                option.innerText = ep;
                episodeSelect.appendChild(option);
            }
        }
    });

    episodeSelect.addEventListener('change', () => {
        const season = seasonSelect.value;
        const lang = languageSelect.value;
        const ep = episodeSelect.value;

        if (ep && animeData[currentSelectedAnime].seasons[season][lang][ep]) {
            const videoUrl = animeData[currentSelectedAnime].seasons[season][lang][ep]["720p"];
            if (videoUrl && videoUrl !== "" && videoUrl !== "link") {
                videoFrame.src = videoUrl;
                bypassLayer.style.display = 'block';
            } else {
                videoFrame.src = "";
                alert("This episode link is not updated yet!");
                bypassLayer.style.display = 'none';
            }
        }
    });

    bypassLayer.addEventListener('click', () => {
        window.open('https://www.effectivecpmnetwork.com/gns647cz?key=de64eff6e82ffd4227fef5e3612071c8', '_blank'); 
        bypassLayer.style.display = 'none';
    });

    const adOverlay = document.getElementById('adOverlay');
    const adLink = document.getElementById('adLink');
    const closeAdBtn = document.getElementById('closeAdBtn');

    setInterval(() => {
        if(videoFrame.src !== "" && videoFrame.src !== window.location.href) {
            showAdPopup();
        }
    }, 300000);

    function showAdPopup() {
        if (adOverlay.style.display === 'flex') return;
        adOverlay.style.display = 'flex';
        adLink.style.display = 'inline-block'; 
        closeAdBtn.style.display = 'none';
    }

    adLink.addEventListener('click', () => {
        setTimeout(() => {
            adLink.style.display = 'none';
            closeAdBtn.style.display = 'inline-block';
        }, 3000);
    });

    closeAdBtn.addEventListener('click', () => {
        adOverlay.style.display = 'none';
    });

    // Initial render
    renderGrid();
